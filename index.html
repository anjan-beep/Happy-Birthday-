
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Shubhangi</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
overflow:hidden;
font-family: 'Trebuchet MS', sans-serif;
background: linear-gradient(-45deg,#ff9a9e,#fad0c4,#a18cd1,#fbc2eb);
background-size:400% 400%;
animation:bg 12s ease infinite;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}
@keyframes bg{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}
.card{
background:rgba(255,255,255,0.15);
backdrop-filter:blur(12px);
padding:40px;
border-radius:30px;
text-align:center;
max-width:650px;
color:white;
box-shadow:0 15px 40px rgba(0,0,0,.25);
z-index:2;
}
h1{font-size:3rem;margin-bottom:15px}
.quote{font-size:1.4rem;line-height:1.5;margin:20px 0}
button{
padding:15px 30px;
border:none;
border-radius:50px;
font-size:18px;
cursor:pointer;
background:white;
}
#surprise{
margin-top:25px;
font-size:1.3rem;
font-weight:bold;
}
.balloon{
position:absolute;
bottom:-150px;
font-size:60px;
animation:float 12s linear infinite;
}
@keyframes float{
from{transform:translateY(0)}
to{transform:translateY(-130vh)}
}
.confetti{
position:absolute;
width:10px;
height:10px;
animation:fall 6s linear infinite;
}
@keyframes fall{
0%{transform:translateY(-100px) rotate(0deg)}
100%{transform:translateY(120vh) rotate(720deg)}
}
</style>
</head>
<body>

<div class="card">
<h1>🎉 Happy Birthday Shubhangi 🎂</h1>
<div class="quote">
Age is just a number,<br>
but kindness, laughter, and charm<br>
never go out of style. 💜
</div>

<button onclick="reveal()">✨ Open Your Surprise ✨</button>
<div id="surprise"></div>
</div>

<script>
for(let i=0;i<25;i++){
let b=document.createElement('div');
b.className='balloon';
b.innerHTML=['🎈','🎉','💜','⭐'][Math.floor(Math.random()*4)];
b.style.left=Math.random()*100+'vw';
b.style.animationDuration=(8+Math.random()*8)+'s';
document.body.appendChild(b);
}

for(let i=0;i<120;i++){
let c=document.createElement('div');
c.className='confetti';
c.style.left=Math.random()*100+'vw';
c.style.background='hsl('+Math.random()*360+',100%,60%)';
c.style.animationDelay=Math.random()*5+'s';
document.body.appendChild(c);
}

function reveal(){
document.getElementById('surprise').innerHTML=
'🌟 Dear Shubhangi, may this year bring you endless smiles, exciting adventures, success in everything you pursue, and beautiful memories to cherish forever. You are truly special! 💜✨';
}
</script>

</body>
</html>
